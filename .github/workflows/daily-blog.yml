name: Daily blog article

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing files or DB state"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAKKO_API_KEY: ${{ secrets.RAKKO_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: npm run blog:auto-post
      - name: Validate static files
        run: npm run validate
      - name: Commit generated article
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add blog sitemap.xml feed.xml index.html
            git commit -m "Add daily diet article"
            git push
          else
            echo "No changes to commit"
          fi
