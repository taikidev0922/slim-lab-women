<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">女性向け朝食メニュー例</title>
  <desc id="desc">ダイエット中の朝食メニューを比較した表</desc>
  <rect width="800" height="450" fill="#ffffff"/>
  <rect x="50" y="54" width="700" height="342" rx="8" fill="#fffafc" stroke="#ead7df" stroke-width="3"/>
  <rect x="50" y="54" width="700" height="72" rx="8" fill="#ec5c93"/>
  <text x="80" y="100" font-family="'Yu Gothic', sans-serif" font-size="28" font-weight="800" fill="#fff">朝ごはんの組み合わせ例</text>
  <g font-family="'Yu Gothic', sans-serif" font-size="22" fill="#231923">
    <text x="86" y="170">1. ごはん + 卵 + 味噌汁</text>
    <text x="86" y="225">2. オートミール + ヨーグルト</text>
    <text x="86" y="280">3. 全粒パン + ツナ + 野菜</text>
    <text x="86" y="335">4. プロテイン + バナナ + ナッツ</text>
  </g>
  <g fill="#69c9b8">
    <circle cx="670" cy="162" r="16"/><circle cx="670" cy="217" r="16"/><circle cx="670" cy="272" r="16"/><circle cx="670" cy="327" r="16"/>
  </g>
</svg>
