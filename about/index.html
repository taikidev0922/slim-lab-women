    <h1>運営方針</h1>
    <p>美スリム研究所は、女性のダイエットに関する悩みへ、生活の中で続けやすい情報を届けるサイトです。過度な減量、医療的な断定、不安をあおる表現は避け、食事・運動・睡眠・習慣を総合的に扱います。</p>
    <div class="note-box">本サイトの情報は一般的な健康情報です。持病、妊娠中、産後すぐ、摂食障害の不安がある場合は、医師や専門家へ相談してください。</div>
